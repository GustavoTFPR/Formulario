<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
    <form action="">
        <fieldset>

            <legend>Dados Pessoais</legend>

            <label for="nome">Nome:</label>
            <input id="nome" type="text"><br>
            
            <label for="endereço">Endereço:</label>
            <input id="endereço" type="endereço"><br>
            
            <label for="cidade">Cidade:</label>
            <input id="cidade" type="cidade"><br>
        
            <label for="estado">Estado:</label>
            <select id="estado">
            <option>Rio de Janeiro</option>
            <option>São Paulo</option>
            <option>Minas Gerais</option>
            <option>Bahia</option>
            </select>

        </fieldset>
    
        <fieldset>

            <legend>Dados Profissionais</legend>
    
            <label for="natureza do cargo">Natureza do Cargo:</label>
            <select id="natureza do cargo">
            <option>Gerência</option>
            <option>x</option>
            <option>y</option>
            <option>z</option>
            </select><br><br>

            <label for="area de interesse">Área de Interesse:</label><br>

            <input type="checkbox" id="computação" name="computação">
            <label for="computação">Computação</label><br>
        
            <input type="checkbox" id="biologia" name="biologia">
            <label for="biologia">Biologia</label><br>
        
            <input type="checkbox" id="meio ambiente" name="meio ambiente">
            <label for="meio ambiente">Meio Ambiente</label><br>
        
            <input type="checkbox" id="engenharia" name="engenharia">
            <label for="engenharia">Engenharia</label><br>
        
            <input type="checkbox" id="historia" name="historia">
            <label for="historia">História</label><br><br>
        
            <label for="bio">Mini Currículo:</label><br>
    
            <textarea
                id="bio"
                placeholder=""
                rows="3"
                cols="30"
                >

            </textarea><br>

        </fieldset><br>
    
        <button type="submit">Enviar</button>
    
        <button type="reset">Limpar</button>
    </form>


        
</body>
</html>
